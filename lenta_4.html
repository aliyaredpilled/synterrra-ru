<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FINIK Multi-Agent System</title>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        /* --- BASE STYLES --- */
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #f8f9fa; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        
        /* --- SYSTEM TITLE --- */
        .system-title {
            position: absolute;
            top: -16%; left: 50%;
            transform: translateX(-50%) rotateX(-40deg);
            font-size: 18px;
            font-weight: 800;
            letter-spacing: 1.5px;
            color: #1e293b;
            z-index: 1000;
            text-transform: uppercase;
            white-space: nowrap;
        }

        /* --- 3D STAGE SETUP --- */
        #app { width: 100%; height: 100%; perspective: 1200px; display: flex; justify-content: center; align-items: flex-start; padding-top: 40px; }
        
        .scene {
            width: 600px; height: 850px; /* Увеличено для терминала */
            position: relative;
            transform-style: preserve-3d;
            transform: rotateX(40deg) rotateZ(0deg);
            transition: transform 0.5s ease;
        }

        /* --- CONNECTING LINES --- */
        .connections-layer {
            position: absolute; width: 100%; height: 100%;
            top: 0; left: 0;
            pointer-events: none;
            z-index: 0;
        }
        .connection-line {
            fill: none; stroke: #e2e8f0; stroke-width: 2; stroke-dasharray: 10; opacity: 0.6;
        }

        /* --- NODES (Agents) --- */
        .node {
            position: absolute;
            width: 70px; height: 70px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transform-style: preserve-3d;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 10;
        }
        /* Counter-rotate content */
        .node-content { transform: rotateX(-40deg); display: flex; flex-direction: column; align-items: center; }
        
        .node-icon { font-size: 24px; display: flex; align-items: center; justify-content: center; }
        .node-icon svg { width: 30px; height: 30px; stroke-width: 1.5; }
        
        /* Label positioned below the icon */
        .node-label {
            font-size: 11px;
            font-weight: 800;
            color: #1e293b;
            white-space: nowrap;
            letter-spacing: 0.5px;
            margin-top: 8px;
        }

        /* --- POSITIONS --- */
        .pos-input { top: -4%; left: 50%; transform: translate(-50%, 0); }
        .pos-core { top: 10%; left: 50%; transform: translate(-50%, 0); width: 100px; height: 100px; }
        .pos-agent-1 { top: 28%; left: 15%; transform: translate(-50%, 0); }
        .pos-agent-2 { top: 28%; left: 50%; transform: translate(-50%, 0); }
        .pos-agent-3 { top: 28%; left: 85%; transform: translate(-50%, 0); }
        .pos-output { top: 46%; left: 50%; transform: translate(-50%, 0); }

        /* --- ACTIVE STATES --- */
        .active-core { transform: translate(-50%, 0) scale(1.15); }
        .active-core .node-icon { filter: drop-shadow(0 0 15px rgba(99, 102, 241, 0.6)); animation: iconPulse 2s infinite; }
        .active-inv { transform: translate(-50%, 0) scale(1.15) !important; }
        .active-inv .node-icon { filter: drop-shadow(0 0 15px rgba(59, 130, 246, 0.6)); }
        .active-comp { transform: translate(-50%, 0) scale(1.15) !important; }
        .active-comp .node-icon { filter: drop-shadow(0 0 15px rgba(245, 158, 11, 0.6)); }
        .active-treas { transform: translate(-50%, 0) scale(1.15) !important; }
        .active-treas .node-icon { filter: drop-shadow(0 0 15px rgba(16, 185, 129, 0.6)); }
        .active-input { transform: translate(-50%, 0) scale(1.15) !important; }
        .active-input .node-icon { filter: drop-shadow(0 0 15px rgba(139, 92, 246, 0.6)); }
        .active-output { transform: translate(-50%, 0) scale(1.15) !important; }
        .active-output .node-icon { filter: drop-shadow(0 0 15px rgba(236, 72, 153, 0.6)); }

        @keyframes iconPulse { 0%, 100% { filter: drop-shadow(0 0 15px rgba(99, 102, 241, 0.6)); } 50% { filter: drop-shadow(0 0 25px rgba(99, 102, 241, 0.8)); } }

        /* --- PARTICLE --- */
        .particle {
            position: absolute;
            width: 18px; height: 18px;
            background: #6366f1;
            border-radius: 50%;
            margin-left: -9px; margin-top: -9px; 
            transform: translateZ(30px) rotateX(-40deg); 
            box-shadow: 0 0 15px currentColor;
            transition: top 1s cubic-bezier(0.45, 0, 0.55, 1), left 1s cubic-bezier(0.45, 0, 0.55, 1), background-color 0.5s, opacity 0.3s;
            z-index: 20;
        }
        .particle-reset { transition: none !important; opacity: 0 !important; }

        /* --- TERMINAL --- */
        .terminal {
            position: fixed;
            bottom: 80px;
            right: 30px;
            width: 380px;
            height: 280px;
            background: rgba(255,255,255,0.95); backdrop-filter: blur(15px);
            border: 1px solid #e5e7eb; border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.12);
            display: flex; flex-direction: column;
            font-family: 'Courier New', monospace; font-size: 12px;
            z-index: 100;
        }
        .term-header { padding: 12px 16px; border-bottom: 1px solid #f0f0f0; background: #fafafa; font-weight: bold; color: #666; display: flex; align-items: center; border-radius: 12px 12px 0 0; }
        .term-body { flex: 1; padding: 14px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .log-entry { opacity: 0; animation: fadeUp 0.3s forwards; display: flex; gap: 8px; }
        .log-time { color: #bbb; min-width: 60px; }
        .log-content { flex: 1; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
    </style>
</head>
<body>

    <div id="app"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const initIcons = () => {
            if (window.lucide) window.lucide.createIcons();
        };

        // --- CONFIG ---
        const DELAYS = {
            INPUT: 1500,
            TO_CORE: 1000,
            AGENT_WORK: 2500,
            TRANSIT: 1000,
            OUTPUT: 2000
        };

        const App = () => {
            const [stage, setStage] = useState(0);
            const [logs, setLogs] = useState([]);
            const [resetting, setResetting] = useState(false);
            const [isPaused, setIsPaused] = useState(false); 

            const addLog = (role, msg, color) => {
                const time = new Date().toLocaleTimeString('en-GB', { hour12: false, hour: "2-digit", minute: "2-digit", second: "2-digit" });
                setLogs(prev => [...prev.slice(-10), { time, role, msg, color }]);
            };

            useEffect(() => { initIcons(); });

            // --- PAUSE/PLAY LISTENER ---
            useEffect(() => {
                const handleMessage = (event) => {
                    if (event.data.type === 'animation') {
                        if (event.data.command === 'pause') {
                            setIsPaused(true);
                        } else if (event.data.command === 'play') {
                            setIsPaused(false);
                        }
                    }
                };
                window.addEventListener('message', handleMessage);
                return () => window.removeEventListener('message', handleMessage);
            }, []);

            // --- SEQUENCE LOGIC ---
            useEffect(() => {
                let timeout;
                const next = (s, ms) => { timeout = setTimeout(() => setStage(s), ms); };

                if (resetting || isPaused) return; 

                switch(stage) {
                    case 0: // Input
                        addLog('INPUT', 'Incoming Data Packet received', '#8b5cf6');
                        next(1, DELAYS.INPUT);
                        break;
                    case 1: // Move to Core
                        next(2, DELAYS.TRANSIT);
                        break;
                    case 2: // At Core
                        addLog('ORCHESTRATOR', 'Analyzing Structure & Delegating...', '#6366f1');
                        next(3, 1000);
                        break;
                    case 3: // Move to Invoice
                        next(4, DELAYS.TRANSIT);
                        break;
                    case 4: // At Invoice
                        addLog('INVOICE', 'Extracting Metadata (OCR)', '#3b82f6');
                        next(5, DELAYS.AGENT_WORK);
                        break;
                    case 5: // Return to Core
                        next(6, DELAYS.TRANSIT); 
                        break;
                    case 6: // Move to Compliance
                        addLog('ORCHESTRATOR', 'Data Extracted. Checking Risks.', '#6366f1');
                        next(7, DELAYS.TRANSIT);
                        break;
                    case 7: // At Compliance
                        addLog('COMPLIANCE', 'Validating against Policy DB', '#f59e0b');
                        next(8, DELAYS.AGENT_WORK);
                        break;
                    case 8: // Return to Core
                        next(9, DELAYS.TRANSIT);
                        break;
                    case 9: // Move to Treasury
                        addLog('ORCHESTRATOR', 'Approved. Sending to Final Validator.', '#6366f1');
                        next(10, DELAYS.TRANSIT);
                        break;
                    case 10: // At Treasury
                        addLog('TREASURY', 'Final Forecast & Liquidity Check', '#10b981');
                        next(11, DELAYS.AGENT_WORK);
                        break;
                    case 11: // Move to Output
                        next(12, DELAYS.TRANSIT);
                        break;
                    case 12: // Output
                        addLog('OUTPUT', 'Result delivered to Client', '#ec4899');
                        timeout = setTimeout(() => {
                            setResetting(true);
                            setStage(0); 
                            setTimeout(() => setResetting(false), 100);
                        }, DELAYS.OUTPUT);
                        break;
                }
                return () => clearTimeout(timeout);
            }, [stage, resetting, isPaused]);

            const getCoords = () => {
                const P = {
                    INPUT: { top: '-4%', left: '50%' },
                    CORE:  { top: '10%', left: '50%' },
                    INV:   { top: '28%', left: '15%' },
                    COMP:  { top: '28%', left: '50%' },
                    TREAS: { top: '28%', left: '85%' },
                    OUT:   { top: '46%', left: '50%' }
                };
                if (stage === 0) return { ...P.INPUT, color: '#8b5cf6' };
                if (stage === 1) return { ...P.CORE, color: '#6366f1' };
                if (stage === 2) return { ...P.CORE, color: '#6366f1' };
                if (stage === 3) return { ...P.INV, color: '#3b82f6' };
                if (stage === 4) return { ...P.INV, color: '#3b82f6' };
                if (stage === 5) return { ...P.CORE, color: '#6366f1' };
                if (stage === 6) return { ...P.COMP, color: '#f59e0b' };
                if (stage === 7) return { ...P.COMP, color: '#f59e0b' };
                if (stage === 8) return { ...P.CORE, color: '#6366f1' };
                if (stage === 9) return { ...P.TREAS, color: '#10b981' };
                if (stage === 10) return { ...P.TREAS, color: '#10b981' };
                if (stage === 11) return { ...P.OUT, color: '#ec4899' };
                if (stage === 12) return { ...P.OUT, color: '#ec4899' };
                return P.INPUT;
            };

            const coords = getCoords();

            return (
                <div id="ui-root">
                    <div className="scene">

                        <div className="system-title">FINIK Multi-Agent System</div>

                        <svg className="connections-layer">
                            <line x1="50%" y1="1%" x2="50%" y2="10%" className="connection-line" />
                            <line x1="50%" y1="17%" x2="15%" y2="28%" className="connection-line" />
                            <line x1="50%" y1="17%" x2="50%" y2="28%" className="connection-line" />
                            <line x1="50%" y1="17%" x2="85%" y2="28%" className="connection-line" />
                            <line x1="85%" y1="36%" x2="50%" y2="46%" className="connection-line" />
                        </svg>

                        <div className={`node pos-input ${stage === 0 ? 'active-input' : ''}`}>
                            <div className="node-content">
                                <div className="node-icon" style={{color: '#8b5cf6'}}><i data-lucide="arrow-down-circle"></i></div>
                                <div className="node-label">INPUT</div>
                            </div>
                        </div>

                        <div className={`node pos-core ${[2,3,5,6,8,9].includes(stage) ? 'active-core' : ''}`}>
                            <div className="node-content">
                                <div className="node-icon" style={{color: '#6366f1'}}><i data-lucide="brain-circuit"></i></div>
                                <div className="node-label">ORCHESTRATOR</div>
                            </div>
                        </div>

                        <div className={`node pos-agent-1 ${stage === 4 ? 'active-inv' : ''}`}>
                            <div className="node-content">
                                <div className="node-icon" style={{color: '#3b82f6'}}><i data-lucide="file-text"></i></div>
                                <div className="node-label">INVOICE</div>
                            </div>
                        </div>

                        <div className={`node pos-agent-2 ${stage === 7 ? 'active-comp' : ''}`}>
                            <div className="node-content">
                                <div className="node-icon" style={{color: '#f59e0b'}}><i data-lucide="shield-alert"></i></div>
                                <div className="node-label">COMPLIANCE</div>
                            </div>
                        </div>

                        <div className={`node pos-agent-3 ${stage === 10 ? 'active-treas' : ''}`}>
                            <div className="node-content">
                                <div className="node-icon" style={{color: '#10b981'}}><i data-lucide="landmark"></i></div>
                                <div className="node-label">TREASURY</div>
                            </div>
                        </div>

                        <div className={`node pos-output ${stage === 12 ? 'active-output' : ''}`}>
                            <div className="node-content">
                                <div className="node-icon" style={{color: '#ec4899'}}><i data-lucide="check-circle"></i></div>
                                <div className="node-label">OUTPUT</div>
                            </div>
                        </div>

                        <div className={`particle ${resetting ? 'particle-reset' : ''}`} style={{
                            top: coords.top,
                            left: coords.left,
                            backgroundColor: coords.color,
                            opacity: resetting ? 0 : 1
                        }}></div>

                    </div>

                    <div className="terminal">
                        <div className="term-header">
                            <div style={{width:8, height:8, background:'#10b981', borderRadius:'50%', marginRight:8}}></div>
                            SYSTEM FEED
                        </div>
                        <div className="term-body" ref={(el) => el && (el.scrollTop = el.scrollHeight)}>
                            {logs.map((l, i) => (
                                <div key={i} className="log-entry">
                                    <span className="log-time">[{l.time}]</span>
                                    <span className="log-content" style={{color: l.color}}>
                                        <strong>{l.role}:</strong> {l.msg}
                                    </span>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('app'));
        root.render(<App />);
    </script>
</body>
</html>
